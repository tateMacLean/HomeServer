services:
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION}
    container_name: portainer
    restart: always
    ports:
      - "${PORTAINER_PORT_HTTP}:9000"
      - "${PORTAINER_PORT_HTTPS}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION}
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT}:8096"
    environment:
      - TZ=${TZ}
    volumes:
      - ${JELLYFIN_MEDIA}:/media
      - ${JELLYFIN_CONFIG}:/config
      - ${JELLYFIN_CACHE}:/cache
    devices:
      - /dev/dri:/dev/dri

  tailscale:
    image: tailscale/tailscale:${TAILSCALE_VERSION}
    container_name: tailscale
    hostname: ${TAILSCALE_HOSTNAME}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-run:/run/tailscale
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - ${LIBRARY_IMPORT_PATH}:/import
      - /etc/localtime:/etc/localtime:ro
      - /mnt/disk1/temp-import2/endof2022:/tempimport:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa 
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23 
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always

  transmission-openvpn:
    image: haugene/transmission-openvpn
    container_name: transmission
    cap_add:
        - NET_ADMIN
    volumes:
        - ${INCOMPLETE_DIR}:/data/incomplete
        - ${CONFIG_DIR}:/config
        - ${TV_DIR}:/data/completed/tv
        - ${MOVIE_DIR}:/data/completed/movies

    environment:
        - PUID=${PUID}
        - PGID=${PGID}
        - OPENVPN_PROVIDER=${OPENVPN_PROVIDER}
        - OPENVPN_CONFIG=${OPENVPN_CONFIG}
        - OPENVPN_USERNAME=${OPENVPN_USERNAME}
        - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
        - LOCAL_NETWORK=10.0.0.0/24
    logging:
        driver: json-file
        options:
            max-size: 10m
    ports:
        - '9091:9091'
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/tminch/docker/prowlarr:/config
    ports:
      - 9696:9696

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
        - PUID=${PUID}
        - PGID=${PGID}
        - TZ=${TZ}
    volumes:
        - ./config/sonarr:/config
        - /mnt/storage/media:/media
        - ${TV_DIR}:/data/completed/tv
    ports:
        - 8989:8989
    depends_on:
        - prowlarr
        - transmission-openvpn
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    hostname: radarr
    environment:
        - PUID=${PUID}
        - PGID=${PGID}
        - TZ=${TZ}
    volumes:
        - ./config/radarr:/config
        - ${MOVIE_DIR}:/data/completed/movies
        - /mnt/storage/media:/media
    ports:
        - 7878:7878
    depends_on:
        - prowlarr
        - transmission-openvpn
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    ports:
      - "8191:8191"
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/tminch/docker/bazarr:/config
      - /mnt/storage/media:/media
    ports:
      - 6767:6767
    restart: unless-stopped
  

volumes:
  portainer_data:
  tailscale-state:
  tailscale-run:
  model-cache:

